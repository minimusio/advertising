<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Random Quote</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --fg: #e8eaed;
      --muted: #9aa0aa;
      --accent: #5b8cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }
    blockquote {
      margin: 0;
      font-size: 1.6rem;
      line-height: 1.4;
      font-weight: 500;
    }
    .author {
      margin-top: 1.25rem;
      color: var(--muted);
      font-size: 1rem;
    }
    .author::before { content: "\2014 "; }
    button {
      margin-top: 2rem;
      padding: 0.7rem 1.3rem;
      font-size: 1rem;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: filter 0.15s ease;
    }
    button:hover { filter: brightness(1.1); }
    button:active { filter: brightness(0.95); }
  </style>
</head>
<body>
  <main class="card">
    <blockquote id="quote"></blockquote>
    <div class="author" id="author"></div>
    <button id="next" type="button">New quote</button>
  </main>

  <script>
    const quotes = [
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "Simplicity is the soul of efficiency.", author: "Austin Freeman" },
      { text: "First, solve the problem. Then, write the code.", author: "John Johnson" },
      { text: "Programs must be written for people to read, and only incidentally for machines to execute.", author: "Harold Abelson" },
      { text: "The best way to predict the future is to invent it.", author: "Alan Kay" },
      { text: "Premature optimization is the root of all evil.", author: "Donald Knuth" },
      { text: "Talk is cheap. Show me the code.", author: "Linus Torvalds" },
      { text: "Make it work, make it right, make it fast.", author: "Kent Beck" },
      { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
      { text: "Stay hungry, stay foolish.", author: "Whole Earth Catalog" }
    ];

    const quoteEl = document.getElementById("quote");
    const authorEl = document.getElementById("author");
    let last = -1;

    function show() {
      let i = Math.floor(Math.random() * quotes.length);
      if (quotes.length > 1) {
        while (i === last) i = Math.floor(Math.random() * quotes.length);
      }
      last = i;
      quoteEl.textContent = quotes[i].text;
      authorEl.textContent = quotes[i].author;
    }

    document.getElementById("next").addEventListener("click", show);
    show();
  </script>
</body>
</html>
